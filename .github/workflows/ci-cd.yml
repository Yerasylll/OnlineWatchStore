name: CI/CD — WatchStore

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # --- 1. Test ---
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: test

  # --- 2. Build & Push Docker image ---
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/watchstore-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/watchstore-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/watchstore-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/watchstore-frontend:${{ github.sha }}

  # --- 3. Deploy ---
  deploy:
    name: Deploy via Docker Compose
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest images and restart
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/watchstore-backend:latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/watchstore-frontend:latest
          docker-compose up -d backend frontend

      - name: Health check
        run: |
          sleep 15
          curl -f http://localhost:3000/api/health || exit 1
          echo "Health check passed"
