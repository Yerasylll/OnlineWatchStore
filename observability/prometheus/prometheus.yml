global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['watchstore-alertmanager:9093']

rule_files:
  - "alert_rules.yml"

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["watchstore-node-exporter:9100"]

  - job_name: "watchstore-backend"
    static_configs:
      - targets: ["watchstore-backend:3000"]
    metrics_path: "/metrics"
    scrape_interval: 10s